<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reserva da Sala de Reunião</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 30px;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #fff;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
    }

    form {
      display: grid;
      gap: 12px;
      margin-bottom: 25px;
    }

    label {
      font-weight: bold;
    }

    input, button {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      background: #222;
      color: white;
      cursor: pointer;
      border: none;
      font-weight: bold;
    }

    button:hover {
      background: #444;
    }

    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: none;
    }

    .error {
      background: #ffe1e1;
      color: #8a0000;
      border: 1px solid #ffaaaa;
    }

    .success {
      background: #e3ffe3;
      color: #075f07;
      border: 1px solid #a6dfa6;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #f0f0f0;
    }

    .delete-btn {
      background: #b00020;
      padding: 6px 10px;
      font-size: 13px;
    }

    .delete-btn:hover {
      background: #d0002a;
    }

    .small {
      color: #666;
      font-size: 14px;
      margin-top: -10px;
      margin-bottom: 20px;
      text-align: center;
    }

    @media (max-width: 650px) {
      body {
        padding: 15px;
      }

      table {
        font-size: 13px;
      }

      th, td {
        padding: 8px;
      }

      .container {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Reserva da Sala de Reunião</h1>
    <p class="small">Clínica Inspirare</p>

    <div id="message" class="message"></div>

    <form id="reservationForm">
      <label for="name">Nome de quem irá usar:</label>
      <input type="text" id="name" required placeholder="Ex: Heloísa" />

      <label for="date">Data:</label>
      <input type="date" id="date" required />

      <label for="start">Horário de início:</label>
      <input type="time" id="start" required />

      <label for="end">Horário de fim:</label>
      <input type="time" id="end" required />

      <button type="submit">Reservar sala</button>
    </form>

    <h2>Reservas cadastradas</h2>

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Data</th>
          <th>Início</th>
          <th>Fim</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody id="reservationList"></tbody>
    </table>
  </div>

  <script>
    // COLE AQUI AS INFORMAÇÕES DO SEU SUPABASE
    const SUPABASE_URL = "COLE_AQUI_A_PROJECT_URL";
    const SUPABASE_ANON_KEY = "COLE_AQUI_A_ANON_KEY";

    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("reservationForm");
    const list = document.getElementById("reservationList");
    const messageBox = document.getElementById("message");

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = "message " + type;
      messageBox.style.display = "block";

      setTimeout(() => {
        messageBox.style.display = "none";
      }, 4000);
    }

    function formatDate(dateString) {
      const [year, month, day] = dateString.split("-");
      return `${day}/${month}/${year}`;
    }

    async function loadReservations() {
      const { data, error } = await db
        .from("reservas")
        .select("*")
        .order("date", { ascending: true })
        .order("start_time", { ascending: true });

      if (error) {
        showMessage("Erro ao carregar reservas. Verifique a conexão com o Supabase.", "error");
        console.error(error);
        return;
      }

      renderReservations(data || []);
    }

    function renderReservations(reservations) {
      list.innerHTML = "";

      if (reservations.length === 0) {
        const row = document.createElement("tr");
        row.innerHTML = `<td colspan="5">Nenhuma reserva cadastrada.</td>`;
        list.appendChild(row);
        return;
      }

      reservations.forEach((reservation) => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${reservation.name}</td>
          <td>${formatDate(reservation.date)}</td>
          <td>${reservation.start_time}</td>
          <td>${reservation.end_time}</td>
          <td><button class="delete-btn" onclick="deleteReservation('${reservation.id}')">Excluir</button></td>
        `;

        list.appendChild(row);
      });
    }

    async function hasConflict(date, start, end) {
      const { data, error } = await db
        .from("reservas")
        .select("*")
        .eq("date", date);

      if (error) {
        console.error(error);
        showMessage("Erro ao verificar conflito de horário.", "error");
        return true;
      }

      return data.some(existing => {
        return start < existing.end_time && end > existing.start_time;
      });
    }

    async function deleteReservation(id) {
      const confirmDelete = confirm("Tem certeza que deseja excluir esta reserva?");
      if (!confirmDelete) return;

      const { error } = await db
        .from("reservas")
        .delete()
        .eq("id", id);

      if (error) {
        showMessage("Erro ao excluir reserva.", "error");
        console.error(error);
        return;
      }

      showMessage("Reserva excluída com sucesso.", "success");
      loadReservations();
    }

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      const name = document.getElementById("name").value.trim();
      const date = document.getElementById("date").value;
      const start = document.getElementById("start").value;
      const end = document.getElementById("end").value;

      if (end <= start) {
        showMessage("O horário de fim precisa ser depois do horário de início.", "error");
        return;
      }

      const conflict = await hasConflict(date, start, end);

      if (conflict) {
        showMessage("Conflito de horário! A sala já está reservada nesse período.", "error");
        return;
      }

      const { error } = await db
        .from("reservas")
        .insert([
          {
            name: name,
            date: date,
            start_time: start,
            end_time: end
          }
        ]);

      if (error) {
        showMessage("Erro ao cadastrar reserva.", "error");
        console.error(error);
        return;
      }

      form.reset();
      showMessage("Reserva cadastrada com sucesso!", "success");
      loadReservations();
    });

    loadReservations();

    db
      .channel("reservas-realtime")
      .on(
        "postgres_changes",
        { event: "*", schema: "public", table: "reservas" },
        () => {
          loadReservations();
        }
      )
      .subscribe();
  </script>
</body>
</html>
